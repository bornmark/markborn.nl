<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Born - Mendix Developer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@700&family=Roboto+Mono:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* Apply custom fonts */
        h1 {
            font-family: 'Titillium Web', sans-serif;
        }
        .font-code {
            font-family: 'Roboto Mono', monospace;
        }
        
        /* 4. Animations for "life" */
        
        /* Core pulse (Reliability, Independence) */
        @keyframes core-pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
                box-shadow: 0 0 25px rgba(59, 130, 246, 0.7);
            }
            50% {
                transform: scale(1.05);
                opacity: 0.9;
                box-shadow: 0 0 40px rgba(59, 130, 246, 1);
            }
        }
        .animate-core-pulse {
            animation: core-pulse 3s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        
        /* Orbit rotation (Constant development, Dynamics) */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 40s linear infinite;
        }
        .animate-spin-slow-reverse {
            animation: spin-slow 50s linear infinite reverse;
        }

        /* Logic "flow" animation */
        @keyframes flow {
            to {
                stroke-dashoffset: 0;
            }
        }
        .svg-flow {
            stroke-dasharray: 100;
            animation: flow 3s linear infinite;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-200 flex flex-col justify-center items-center min-h-screen p-4 overflow-hidden">

    <h1 class="text-5xl md:text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 z-10">
        MARK BORN
    </h1>

    <div class="relative w-[350px] h-[350px] md:w-[500px] md:h-[500px] mt-8 flex justify-center items-center">

        <div class="absolute w-full h-full grid grid-cols-6 grid-rows-6 opacity-10">
            <div class="col-span-6 h-px bg-cyan-500 self-start"></div>
            <div class="col-span-6 h-px bg-cyan-500 self-center"></div>
            <div class="col-span-6 h-px bg-cyan-500 self-end"></div>
            <div class="row-span-6 w-px bg-cyan-500 justify-self-start"></div>
            <div class="row-span-6 w-px bg-cyan-500 justify-self-center"></div>
            <div class="row-span-6 w-px bg-cyan-500 justify-self-end"></div>
        </div>
        
        <a href="mailto:info@markborn.nl" 
           class="absolute z-10 w-24 h-24 md:w-32 md:h-32 bg-blue-600 rounded-full flex justify-center items-center shadow-xl animate-core-pulse
                  transition-transform duration-300 hover:scale-110"
           title="Click to email me">
            <span class="font-code font-bold text-white text-sm md:text-lg">e-mail</span>
        </a>
        
        <div class="absolute w-52 h-52 md:w-72 md:h-72 border-2 border-dashed border-cyan-700 rounded-full animate-spin-slow">
            <div class="absolute -top-5 left-1/2 -translate-x-1/2 w-24 h-10 bg-cyan-400 text-gray-900 rounded-lg flex justify-center items-center font-code font-bold shadow-lg shadow-cyan-400/30">
                MENDIX
            </div>
        </div>

        <div class="absolute w-72 h-72 md:w-[420px] md:h-[420px] border border-dotted border-purple-600 rounded-full animate-spin-slow-reverse">
            <div class="absolute -bottom-4 left-1/4 -translate-x-1/2 w-20 h-8 bg-purple-500 text-white rounded-md flex justify-center items-center font-code text-sm shadow-md shadow-purple-500/30">
                UI/UX
            </div>
            
            <div class="absolute -top-4 right-1/4 translate-x-1/2 w-20 h-8 bg-green-500 text-white rounded-md flex justify-center items-center font-code text-sm shadow-md shadow-green-500/30">
                TEAM
            </div>
        </div>

        <svg class="absolute w-full h-full opacity-30" viewbox="0 0 200 200">
            <path d="M 100 100 L 100 28" stroke="#06b6d4" stroke-width="2" fill="none" class="svg-flow" />
            <path d="M 100 100 L 50 150" stroke="#a855f7" stroke-width="1.5" fill="none" class="svg-flow" style="animation-delay: 1s;" />
            <path d="M 100 100 L 150 50" stroke="#22c55e" stroke-width="1.5" fill="none" class="svg-flow" style="animation-delay: 2s;" />
        </svg>

        <span class="absolute top-1/4 left-1/4 font-code text-lg text-green-600 opacity-50 -rotate-12">&lt;/&gt;</span>
        <span class="absolute bottom-1/4 right-1/4 font-code text-lg text-yellow-500 opacity-50 rotate-12">{ js }</span>
        <span class="absolute bottom-1/4 left-1/4 font-code text-lg text-blue-400 opacity-50 rotate-12">.css</span>

    </div>

    <p class="mt-12 font-code text-gray-400 z-10 text-center max-w-lg">
        Mendix Developer <span class="text-cyan-400">|</span> UI/UX Design <span class="text-cyan-400">|</span> HTML, CSS, JS Foundation
    </p>

</body>
</html>
